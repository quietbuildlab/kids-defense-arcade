<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kids Defense Arcade</title>
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="Game setup">
        <div>
          <h1 id="gameTitle">Kids Defense Arcade</h1>
          <p id="gameSubtitle">Switch between Candy Garden and Monster Base in one game.</p>
        </div>

        <div class="settings">
          <label>
            Game
            <select id="themeSelect">
              <option value="monster" selected>Monster Base</option>
              <option value="candy">Candy Garden</option>
            </select>
          </label>

          <label>
            Difficulty
            <select id="difficulty">
              <option value="rookie">Rookie</option>
              <option value="normal" selected>Normal</option>
              <option value="veteran">Veteran</option>
            </select>
          </label>

          <label class="check">
            <input id="endlessMode" type="checkbox" />
            Endless waves
          </label>

          <button id="startButton" type="button">Start Mission</button>
        </div>
      </section>

      <section class="game-shell">
        <aside class="panel" aria-label="Game controls">
          <div class="stat">
            <span>Wave</span>
            <strong id="waveText">1</strong>
          </div>
          <div class="stat">
            <span>Design</span>
            <strong id="designText">Switchback</strong>
          </div>
          <div class="stat">
            <span>Base HP</span>
            <strong id="baseText">25</strong>
          </div>
          <div class="stat">
            <span>Credits</span>
            <strong id="moneyText">600</strong>
          </div>
          <div class="stat">
            <span>Boss</span>
            <strong id="bossText">Standby</strong>
          </div>

          <div class="build-menu" aria-label="Build menu">
            <button class="tool-card active" data-tool="fighter" type="button">
              <span>🪖</span>
              Fighter Post
              <small>55 credits</small>
            </button>
            <button class="tool-card" data-tool="rocket" type="button">
              <span>🚀</span>
              Rocket Squad
              <small>95 credits</small>
            </button>
            <button class="tool-card" data-tool="frost" type="button">
              <span>❄️</span>
              Freeze Trap
              <small>70 credits</small>
            </button>
            <button class="tool-card" data-tool="wall" type="button">
              <span>🧱</span>
              Steel Wall
              <small>45 credits</small>
            </button>
            <button class="tool-card danger" data-tool="remove" type="button">
              <span>🛠️</span>
              Remove
              <small>refund 50%</small>
            </button>
          </div>

          <p id="message" class="message">Pick a tool, then click an empty ground tile.</p>
        </aside>

        <div id="game" aria-label="Kids Defense Arcade game area"></div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
